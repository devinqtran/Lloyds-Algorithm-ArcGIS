<svg id="icon1" width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background -->
                    <rect width="128" height="128" fill="#ffffff"/>
                    
                    <!-- Voronoi-style polygons -->
                    <path d="M 0,0 L 64,45 L 64,0 Z" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
                    <path d="M 64,0 L 128,0 L 128,60 L 64,45 Z" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
                    <path d="M 0,0 L 0,70 L 45,64 L 64,45 Z" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
                    <path d="M 64,45 L 45,64 L 50,128 L 90,128 L 128,60 Z" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
                    <path d="M 0,70 L 0,128 L 50,128 L 45,64 Z" fill="#fce4ec" stroke="#c2185b" stroke-width="1.5"/>
                    <path d="M 90,128 L 128,128 L 128,60 Z" fill="#fff9c4" stroke="#fbc02d" stroke-width="1.5"/>
                    
                    <!-- Facility points (red circles) -->
                    <circle cx="64" cy="45" r="7" fill="#e53935" stroke="white" stroke-width="2"/>
                    <circle cx="45" cy="64" r="7" fill="#e53935" stroke="white" stroke-width="2"/>
                    <circle cx="128" cy="60" r="7" fill="#e53935" stroke="white" stroke-width="2"/>
                    
                    <!-- Small demand points -->
                    <circle cx="32" cy="20" r="3" fill="#424242" opacity="0.6"/>
                    <circle cx="96" cy="25" r="3" fill="#424242" opacity="0.6"/>
                    <circle cx="20" cy="90" r="3" fill="#424242" opacity="0.6"/>
                    <circle cx="75" cy="105" r="3" fill="#424242" opacity="0.6"/>
                    <circle cx="110" cy="95" r="3" fill="#424242" opacity="0.6"/>
                    <circle cx="15" cy="45" r="3" fill="#424242" opacity="0.6"/>
                </svg>